name: SafeShareLocal
options:
  minimumXcodeGenVersion: 2.38.0
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    PRODUCT_BUNDLE_IDENTIFIER: com.safeshare.local
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    INFOPLIST_KEY_CFBundleDisplayName: SafeShare Local
    INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 SafeShare"
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
    INFOPLIST_KEY_NSSupportsAutomaticTermination: YES
    INFOPLIST_KEY_NSSupportsSuddenTermination: YES
    GENERATE_INFOPLIST_FILE: YES

configs:
  Debug: debug
  Release: release

targets:
  SafeShareLocalMac:
    type: application
    platform: macOS
    sources:
      - path: SafeShareMacApp/AppMain
      - path: SafeShareMacApp/Assets.xcassets
      - path: SafeShareLocalApp/Sources/SafeShareLocalApp
        excludes:
          - Core/SafeShareLocalApp.swift
          - Resources/AppIcon
    resources:
      - path: SafeShareLocalApp/Sources/SafeShareLocalApp/Resources
    settings:
      base:
        PRODUCT_NAME: SafeShareLocal
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets: []
      gatherCoverageData: false
